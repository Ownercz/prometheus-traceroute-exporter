name: Build and Publish Docker Image
run-name: Build and publish prometheus-traceroute-exporter image

'on':
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Docker | Login
        run: |
          echo "${{ secrets.DOCKERHUB_GITEA_TOKEN }}" | docker login -u ownercz --password-stdin

      - name: Docker | Build image
        run: |
          docker build -t ownercz/prometheus-traceroute-exporter:latest .

      - name: Docker | Push image latest
        run: |
          docker push ownercz/prometheus-traceroute-exporter:latest

      - name: Docker | Push image tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          docker tag ownercz/prometheus-traceroute-exporter:latest ownercz/prometheus-traceroute-exporter:${TAG}
          docker push ownercz/prometheus-traceroute-exporter:${TAG}
