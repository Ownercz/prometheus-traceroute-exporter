name: Build Prometheus Traceroute Exporter Image
run-name: Build prometheus-traceroute-exporter image and publish

'on': [push]

jobs:
  Build-Prometheus-Traceroute-Exporter-Image:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare | Setup git
        run: |
          git config --global user.name "Radim Lipovčan"
          git config --global user.email "radim@lipovcan.cz"

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Docker | Build image and login to Docker Hub with publication
        run: |
          echo "${{ secrets.DOCKERHUB_GITEA_TOKEN }}" | docker login -u ownercz --password-stdin
          docker build -t ownercz/prometheus-traceroute-exporter:latest .
          docker push ownercz/prometheus-traceroute-exporter:latest

      - name: Docker | Tag and push version image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          docker tag ownercz/prometheus-traceroute-exporter:latest ownercz/prometheus-traceroute-exporter:${TAG}
          docker push ownercz/prometheus-traceroute-exporter:${TAG}
